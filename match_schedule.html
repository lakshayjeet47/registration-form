<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Match Schedule</title>
  <link rel="stylesheet" href="styles.css">
  <script src="topbar.js" defer></script>
  <style>
    .schedule-header {
      margin: 24px 0 12px;
      color: #0f2f56;
      font-size: 1.3rem;
      font-weight: 700;
    }

    .schedule-hint {
      margin: 0 0 12px;
      color: #4a5a70;
      font-size: .95rem;
      font-weight: 600;
    }

    .schedule-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 10px;
    }

    .schedule-item {
      background: #ffffff;
      border: 1px solid #dce8f6;
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 2px 10px rgba(10, 10, 10, 0.05);
    }

    .schedule-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: .78rem;
      font-weight: 700;
      background: #eaf3ff;
      color: #1b5a93;
      border: 1px solid #c5dcf5;
    }

    .status-badge {
      background: #eef7ea;
      color: #2f6d27;
      border-color: #cde3c8;
    }

    .vs-row {
      font-weight: 800;
      color: #0f2f56;
      margin-bottom: 8px;
      font-size: 1rem;
    }

    .schedule-meta {
      display: grid;
      gap: 5px;
      color: #31445f;
      font-size: .9rem;
    }

    .loading-item {
      color: #50627a;
      background: #eef5ff;
      border: 1px dashed #c9daef;
      font-style: italic;
    }

    @media (max-width: 520px) {
      .schedule-item {
        padding: 10px;
      }

      .vs-row {
        font-size: .93rem;
      }
    }
  </style>
</head>
<body>
  <div id="sharedTopbar"></div>
  <nav class="main-navbar">
    <a href="index.html" class="nav-link">Registration Form</a>
    <a href="fee_details.html" class="nav-link">Payment Info</a>
    <a href="ground_details.html" class="nav-link">Ground Details</a>
    <a href="match_schedule.html" class="nav-link">Match Schedule</a>
  </nav>
  <main class="container">
    <div class="schedule-header">Match Schedule</div>
    <p id="scheduleHint" class="schedule-hint">Getting match schedule...</p>

    <ul id="scheduleList" class="schedule-list">
      <li class="schedule-item loading-item">Getting match schedule...</li>
    </ul>
  </main>

  <script src="match_schedule.js"></script>
</body>
</html>
